<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>系统推荐卸车占比 - 上海市</title>
<style>
:root{
  --primary:#2563eb;--primary-light:#eff6ff;--primary-dark:#1d4ed8;
  --success:#10b981;--success-bg:#ecfdf5;--danger:#ef4444;--danger-bg:#fef2f2;
  --text-main:#0f172a;--text-secondary:#64748b;--text-muted:#94a3b8;
  --bg:#f8fafc;--card-bg:#ffffff;--border:#e2e8f0;--border-light:#f1f5f9;
  --shadow:0 1px 3px rgba(0,0,0,0.04),0 1px 2px rgba(0,0,0,0.02);
  --shadow-hover:0 10px 25px -5px rgba(0,0,0,0.06),0 4px 10px -2px rgba(0,0,0,0.03);
  --radius:16px;--radius-sm:10px;--radius-xs:6px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text-main);min-width:1200px;line-height:1.5}

/* Header */
.header{background:var(--card-bg);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow);flex-wrap:wrap;gap:12px}
.header h1{font-size:20px;font-weight:700;color:var(--text-main);letter-spacing:-0.3px}
.header h1 span{font-weight:400;color:var(--text-muted);margin-left:6px}
.header-controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.filter-group{display:flex;align-items:center;gap:6px}
.filter-group label{font-size:12px;color:var(--text-muted);font-weight:600;white-space:nowrap}
.header input[type="date"],.header select{padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius-xs);font-size:13px;background:#fff;color:var(--text-main);outline:none;transition:border-color .2s;font-family:inherit;min-width:110px}
.header input[type="date"]:focus,.header select:focus{border-color:var(--primary)}
.header .btn{padding:7px 16px;border:none;border-radius:var(--radius-xs);cursor:pointer;font-size:13px;font-weight:600;background:var(--primary-light);color:var(--primary);transition:all .2s;font-family:inherit}
.header .btn:hover{background:var(--primary);color:#fff}
.header .btn.secondary{background:#f1f5f9;color:var(--text-secondary)}
.header .btn.secondary:hover{background:var(--border);color:var(--text-main)}

/* Container */
.container{max-width:1400px;margin:0 auto;padding:24px 32px}

/* Breadcrumb */
.breadcrumb{display:flex;align-items:center;gap:8px;margin-bottom:20px;font-size:14px}
.breadcrumb span{padding:7px 18px;border-radius:20px;cursor:pointer;background:#fff;border:1px solid var(--border-light);color:var(--text-secondary);transition:all .2s;font-weight:500;box-shadow:var(--shadow)}
.breadcrumb span:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.breadcrumb span.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 2px 8px rgba(37,99,235,0.25)}
.breadcrumb .arrow{color:var(--text-muted);font-size:12px;margin:0 2px}

/* KPI Cards */
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:24px}
.card{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border-light);overflow:hidden;transition:transform .25s,box-shadow .25s}
.card:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover)}
.card .bar{height:5px;width:100%}
.card .bar.blue{background:linear-gradient(90deg,#3b82f6,#2563eb)}
.card .bar.indigo{background:linear-gradient(90deg,#6366f1,#4f46e5)}
.card .bar.violet{background:linear-gradient(90deg,#8b5cf6,#7c3aed)}
.card .bar.slate{background:linear-gradient(90deg,#94a3b8,#64748b)}
.card .bar.gold{background:linear-gradient(90deg,#f59e0b,#d97706)}
.card-body{padding:20px 24px}
.card .label{font-size:12px;color:var(--text-muted);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.card .value-wrap{display:flex;align-items:baseline;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.card .value{font-size:32px;font-weight:800;color:var(--text-main);letter-spacing:-0.5px;line-height:1}
.card .sub{font-size:13px;color:var(--text-secondary);font-weight:500}
.card .change{font-size:13px;font-weight:700;padding:2px 8px;border-radius:6px;display:inline-flex;align-items:center;gap:3px}
.card .change.up{color:var(--success);background:var(--success-bg)}
.card .change.down{color:var(--danger);background:var(--danger-bg)}

/* Goal Ring Chart */
.goal-ring-panel{background:var(--card-bg);border-radius:var(--radius);padding:24px 32px;box-shadow:var(--shadow);border:1px solid var(--border-light);display:flex;align-items:center;gap:40px;flex-wrap:wrap;margin-bottom:24px}
.goal-ring-wrap{position:relative;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.goal-ring-wrap svg{width:210px;height:210px}
.ring-track{fill:none;stroke:var(--border-light);stroke-linecap:round}
.ring-goal{fill:none;stroke-linecap:round;transition:stroke-dasharray .6s ease}
.ring-time{fill:none;stroke-linecap:round;transition:stroke-dasharray .6s ease}
.ring-center{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.ring-center .label{font-size:12px;color:var(--text-muted);font-weight:600;margin-bottom:4px;white-space:nowrap}
.ring-center .value{font-size:30px;font-weight:800;letter-spacing:-0.5px;line-height:1}
.ring-center .sub{font-size:11px;color:var(--text-muted);font-weight:500;margin-top:4px;white-space:nowrap}
.ring-legend{display:flex;flex-direction:column;gap:18px;flex:1;min-width:220px}
.ring-legend-item{display:flex;align-items:center;gap:12px}
.ring-legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ring-legend-info{flex:1}
.ring-legend-title{font-size:14px;font-weight:600;color:var(--text-main);margin-bottom:2px}
.ring-legend-desc{font-size:12px;color:var(--text-muted);font-weight:500}
.ring-legend-val{font-size:18px;font-weight:800;letter-spacing:-0.3px;flex-shrink:0}
.ring-status{font-size:12px;font-weight:600;padding:2px 10px;border-radius:10px;display:inline-block;margin-left:8px}
.ring-status.ok{background:var(--success-bg);color:var(--success)}
.ring-status.warn{background:#fffbeb;color:#d97706}
.ring-status.danger{background:var(--danger-bg);color:var(--danger)}
.ring-status.normal{background:var(--primary-light);color:var(--primary)}

/* Decline Ranking */
.rank-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.rank-panel{background:var(--card-bg);border-radius:var(--radius);padding:20px 24px;box-shadow:var(--shadow);border:1px solid var(--border-light)}
.rank-panel h3{font-size:15px;margin-bottom:16px;color:var(--text-main);font-weight:700;letter-spacing:-0.2px;display:flex;align-items:center;gap:8px}
.rank-panel h3::before{content:'';display:inline-block;width:4px;height:16px;border-radius:2px;background:var(--danger)}
.rank-panel h3.week::before{background:var(--primary)}
.rank-list{display:flex;flex-direction:column;gap:10px}
.rank-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:var(--radius-xs);background:#f8fafc;border:1px solid var(--border-light);transition:all .2s}
.rank-item:hover{border-color:var(--border);background:#fff}
.rank-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0}
.rank-num.g1{background:linear-gradient(135deg,#ef4444,#dc2626)}
.rank-num.g2{background:linear-gradient(135deg,#f97316,#ea580c)}
.rank-num.g3{background:linear-gradient(135deg,#f59e0b,#d97706)}
.rank-info{flex:1;min-width:0}
.rank-name{font-size:14px;font-weight:600;color:var(--text-main);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-detail{font-size:12px;color:var(--text-muted);font-weight:500}
.rank-val{text-align:right;flex-shrink:0}
.rank-pct{font-size:18px;font-weight:800;color:var(--danger);letter-spacing:-0.3px}
.rank-change{font-size:11px;color:var(--text-muted);font-weight:500}

/* Main Grid */
.main-grid{display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:24px}
.panel{background:var(--card-bg);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);border:1px solid var(--border-light)}
.panel h3{font-size:15px;margin-bottom:20px;color:var(--text-main);font-weight:700;letter-spacing:-0.2px;display:flex;align-items:center;gap:8px}
.panel h3::before{content:'';display:inline-block;width:4px;height:16px;border-radius:2px;background:var(--primary)}

/* Trend Chart */
.trend-panel{min-height:320px}
.trend-wrap{display:flex;flex-direction:column;gap:16px}
.trend-values{display:flex;gap:8px;justify-content:space-between;margin-bottom:8px}
.trend-val{text-align:center;flex:1;padding:10px 4px;border-radius:var(--radius-xs);transition:background .2s}
.trend-val:hover{background:var(--primary-light)}
.trend-val .date{font-size:12px;color:var(--text-muted);margin-bottom:6px;font-weight:500}
.trend-val .pct{font-size:16px;font-weight:700;color:var(--text-secondary);transition:color .2s}
.trend-val .pct.current{color:var(--primary);font-size:20px}
.trend-val:hover .pct{color:var(--primary)}
.trend-val .raw{font-size:11px;color:var(--text-muted);margin-top:4px;white-space:nowrap}
.trend-chart{width:100%;height:180px;position:relative}
.trend-chart svg{width:100%;height:100%;display:block}

/* Compare Grid */
.compare-section h4{font-size:12px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px;margin-top:4px}
.compare-section h4:first-of-type{margin-top:0}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.cw{padding:16px;border-radius:var(--radius-sm);text-align:center;border:1px solid var(--border-light);transition:all .2s}
.cw:hover{border-color:var(--primary);box-shadow:0 2px 8px rgba(37,99,235,0.08)}
.cw.current{background:var(--primary-light);border-color:var(--primary)}
.cw.past{background:#f8fafc;border-color:var(--border-light)}
.cw .label{font-size:12px;color:var(--text-muted);margin-bottom:6px;font-weight:600}
.cw .val{font-size:26px;font-weight:800;letter-spacing:-0.5px}
.cw.current .val{color:var(--primary)}
.cw.past .val{color:var(--text-secondary)}
.cw .sub{font-size:11px;color:var(--text-muted);margin-top:6px;font-weight:500}

/* Drill-down Grid */
.drill-panel{margin-bottom:24px}
.drill-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;margin-top:16px}
.t1-item{padding:20px;border-radius:var(--radius-sm);background:var(--card-bg);border:1px solid var(--border);cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.t1-item::before{content:'';position:absolute;top:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,var(--primary),#60a5fa);transform:scaleX(0);transform-origin:left;transition:transform .3s}
.t1-item:hover{border-color:var(--primary);box-shadow:0 4px 16px rgba(37,99,235,0.1);transform:translateY(-2px)}
.t1-item:hover::before{transform:scaleX(1)}
.t1-item .name{font-weight:600;font-size:15px;color:var(--text-main);display:flex;align-items:center;gap:8px}
.t1-item .name::before{content:'';display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--primary);opacity:0.6}
.t1-item .pct{font-size:28px;font-weight:800;color:var(--primary);margin:10px 0 4px;letter-spacing:-0.5px}
.t1-item .sub{font-size:12px;color:var(--text-muted);font-weight:500}
.t1-item .sub span{color:var(--text-secondary);font-weight:600}

/* Achievement Cards (personnel, sorted) */
.achieve-section{margin-bottom:24px}
.achieve-section h3{font-size:15px;margin-bottom:16px;color:var(--text-main);font-weight:700;display:flex;align-items:center;gap:8px}
.achieve-section h3::before{content:'';display:inline-block;width:4px;height:16px;border-radius:2px;background:linear-gradient(180deg,#f59e0b,#d97706)}
.achieve-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
.achieve-item{padding:20px;border-radius:var(--radius-sm);background:var(--card-bg);border:1px solid var(--border);cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.achieve-item::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#f59e0b,#fbbf24);transform:scaleX(0);transform-origin:left;transition:transform .3s}
.achieve-item:hover{border-color:#f59e0b;box-shadow:0 8px 24px rgba(245,158,11,0.12);transform:translateY(-3px)}
.achieve-item:hover::before{transform:scaleX(1)}
.achieve-item.rank-1{border-color:#fbbf24;background:linear-gradient(135deg,#fffbeb,#fffdf5)}
.achieve-item.rank-2{border-color:#d1d5db;background:linear-gradient(135deg,#f9fafb,#f3f4f6)}
.achieve-item.rank-3{border-color:#fdba74;background:linear-gradient(135deg,#fff7ed,#fffbeb)}
.achieve-item .achieve-rank{position:absolute;top:12px;right:14px;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff}
.achieve-item.rank-1 .achieve-rank{background:linear-gradient(135deg,#f59e0b,#d97706);box-shadow:0 2px 8px rgba(245,158,11,0.3)}
.achieve-item.rank-2 .achieve-rank{background:linear-gradient(135deg,#94a3b8,#64748b);box-shadow:0 2px 8px rgba(100,116,139,0.3)}
.achieve-item.rank-3 .achieve-rank{background:linear-gradient(135deg,#fb923c,#ea580c);box-shadow:0 2px 8px rgba(234,88,12,0.3)}
.achieve-item .name{font-weight:600;font-size:15px;color:var(--text-main);margin-bottom:10px;padding-right:32px}
.achieve-item .achieve-pct{font-size:32px;font-weight:800;letter-spacing:-0.5px;line-height:1}
.achieve-item .achieve-pct.green{color:var(--success)}
.achieve-item .achieve-pct.amber{color:#f59e0b}
.achieve-item .achieve-pct.red{color:var(--danger)}
.achieve-item .achieve-sub{font-size:12px;color:var(--text-muted);margin-top:6px;font-weight:500}
.achieve-item .achieve-sub span{color:var(--text-secondary);font-weight:600}

/* MoM creative indicator cards */
.mom-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:24px}
.mom-card{position:relative;background:var(--card-bg);box-shadow:var(--shadow);padding:24px 20px 20px;text-align:center;overflow:hidden;transition:all .3s;cursor:default;border:1px solid var(--border-light)}
.mom-card::after{content:'';position:absolute;top:-25px;right:-25px;width:90px;height:90px;border-radius:50%;opacity:0.06;transition:all .4s}
.mom-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-hover)}
.mom-card:hover::after{transform:scale(1.5);opacity:0.1}
.mom-card .mom-icon{width:48px;height:48px;margin:0 auto 12px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;transition:transform .3s}
.mom-card:hover .mom-icon{transform:scale(1.1)}
.mom-card .mom-label{font-size:11px;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px}
.mom-card .mom-value{font-size:28px;font-weight:800;letter-spacing:-0.5px;line-height:1.1;margin-bottom:4px}
.mom-card .mom-sub{font-size:11px;color:var(--text-muted);font-weight:500;line-height:1.4}
.mom-card .mom-trend{display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:700;padding:3px 10px;border-radius:12px;margin-top:8px}
/* day MoM - diamond/angled shape */
.mom-card.day{border-top:3px solid #3b82f6;border-radius:var(--radius);clip-path:polygon(0 8px,8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%)}
.mom-card.day .mom-icon{background:linear-gradient(135deg,#dbeafe,#eff6ff);color:#2563eb}
.mom-card.day .mom-value{color:#1d4ed8}
.mom-card.day::after{background:#3b82f6}
/* week MoM - hexagon shape */
.mom-card.week{border-top:3px solid #10b981;border-radius:var(--radius);clip-path:polygon(5% 0,95% 0,100% 20%,100% 80%,95% 100%,5% 100%,0 80%,0 20%)}
.mom-card.week .mom-icon{background:linear-gradient(135deg,#d1fae5,#ecfdf5);color:#059669}
.mom-card.week .mom-value{color:#047857}
.mom-card.week::after{background:#10b981}
/* month MoM - wave top shape */
.mom-card.month{border-top:3px solid #8b5cf6;border-radius:50% 50% var(--radius) var(--radius) / 25px 25px var(--radius) var(--radius)}
.mom-card.month .mom-icon{background:linear-gradient(135deg,#ede9fe,#f5f3ff);color:#7c3aed}
.mom-card.month .mom-value{color:#6d28d9}
.mom-card.month::after{background:#8b5cf6}
.mom-trend.up{background:#ecfdf5;color:#059669}
.mom-trend.down{background:#fef2f2;color:#dc2626}
.mom-trend.flat{background:#f1f5f9;color:#64748b}

/* Loading */
.loading{text-align:center;padding:80px 20px;color:var(--text-muted);font-size:15px;font-weight:500}
.loading::after{content:'';display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;margin-left:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="header">
<h1>系统推荐卸车占比<span>· 上海市</span></h1>
<div class="header-controls">
<div class="filter-group">
<label>起始日期</label>
<input type="date" id="dp_start" onchange="onDateChange()">
<label>结束日期</label>
<input type="date" id="dp_end" onchange="onDateChange()">
</div>
<div class="filter-group">
<label>T2</label>
<select id="sel_t2" onchange="onT2Change()"><option value="">全部 T2</option></select>
<label>T1</label>
<select id="sel_t1" onchange="onT1Change()"><option value="">全部 T1</option></select>
<label>T0</label>
<select id="sel_t0" onchange="onT0Change()"><option value="">全部 T0</option></select>
</div>
<button class="btn secondary" onclick="resetFilters()">重置</button>
<button class="btn" onclick="latest()">最新</button>
</div>
</div>
<div class="container" id="app">
<div class="loading">数据加载中</div>
</div>
<script src="dashboard_data.js"></script>
<script>
let DATA = window.DATA || null;
let level = "city", t2 = "", t1 = "", worker = "";
let selStart = "", selEnd = "";

if (DATA) {
    let dates = DATA.all_dates;
    selEnd = dates[dates.length - 1];
    selStart = dates[Math.max(0, dates.length - 7)];
    document.getElementById("dp_start").value = selStart;
    document.getElementById("dp_end").value = selEnd;
    initFilters();
    render();
} else {
    document.getElementById("app").innerHTML = "<div class='loading'>数据加载失败</div>";
}

function initFilters() {
    let t2Sel = document.getElementById("sel_t2");
    t2Sel.innerHTML = '<option value="">全部 T2</option>';
    DATA.t2_list.forEach(t => { t2Sel.innerHTML += '<option value="' + t + '">' + t + '</option>'; });
    updateT1Options();
    updateT0Options();
}

function updateT1Options() {
    let t2Val = document.getElementById("sel_t2").value;
    let t1Sel = document.getElementById("sel_t1");
    let curT1 = t1Sel.value;
    t1Sel.innerHTML = '<option value="">全部 T1</option>';
    let t1s = new Set();
    if (t2Val) {
        DATA.t2_data[t2Val].t1_list.forEach(t => t1s.add(t));
    } else {
        for (let k in DATA.t1_data) t1s.add(DATA.t1_data[k].t1);
    }
    Array.from(t1s).sort().forEach(t => { t1Sel.innerHTML += '<option value="' + t + '">' + t + '</option>'; });
    if (t1s.has(curT1)) t1Sel.value = curT1;
    updateT0Options();
}

function updateT0Options() {
    let t2Val = document.getElementById("sel_t2").value;
    let t1Val = document.getElementById("sel_t1").value;
    let t0Sel = document.getElementById("sel_t0");
    let curT0 = t0Sel.value;
    t0Sel.innerHTML = '<option value="">全部 T0</option>';
    let workers = new Set();
    if (t2Val && t1Val) {
        let k = t2Val + "/" + t1Val;
        if (DATA.t1_data[k]) DATA.t1_data[k].workers.forEach(w => workers.add(w));
    } else if (t2Val) {
        DATA.t2_data[t2Val].t1_list.forEach(t1 => {
            let k = t2Val + "/" + t1;
            if (DATA.t1_data[k]) DATA.t1_data[k].workers.forEach(w => workers.add(w));
        });
    } else if (t1Val) {
        for (let k in DATA.t1_data) { if (DATA.t1_data[k].t1 === t1Val) DATA.t1_data[k].workers.forEach(w => workers.add(w)); }
    } else {
        for (let k in DATA.worker_data) { let parts = k.split("/"); if (parts.length >= 3) workers.add(parts[2]); }
    }
    Array.from(workers).sort().forEach(w => { t0Sel.innerHTML += '<option value="' + w + '">' + w + '</option>'; });
    if (workers.has(curT0)) t0Sel.value = curT0;
}

function onDateChange() {
    let s = document.getElementById("dp_start").value;
    let e = document.getElementById("dp_end").value;
    if (s && e && s <= e) { selStart = s; selEnd = e; }
    render();
}

function onT2Change() {
    t2 = document.getElementById("sel_t2").value;
    if (t2) level = "t2"; else level = "city";
    t1 = ""; worker = "";
    document.getElementById("sel_t1").value = "";
    document.getElementById("sel_t0").value = "";
    updateT1Options(); updateT0Options();
    render();
}

function onT1Change() {
    t1 = document.getElementById("sel_t1").value;
    if (t1) { level = "t1"; if (!t2) t2 = document.getElementById("sel_t2").value || DATA.t2_list[0]; }
    else { level = t2 ? "t2" : "city"; }
    worker = "";
    document.getElementById("sel_t0").value = "";
    updateT0Options();
    render();
}

function onT0Change() {
    worker = document.getElementById("sel_t0").value;
    if (worker) { level = "worker"; if (!t1) t1 = document.getElementById("sel_t1").value || DATA.t2_data[t2].t1_list[0]; }
    else { level = t1 ? "t1" : (t2 ? "t2" : "city"); }
    render();
}

function resetFilters() {
    level = "city"; t2 = ""; t1 = ""; worker = "";
    let dates = DATA.all_dates;
    selEnd = dates[dates.length - 1];
    selStart = dates[Math.max(0, dates.length - 7)];
    document.getElementById("dp_start").value = selStart;
    document.getElementById("dp_end").value = selEnd;
    document.getElementById("sel_t2").value = "";
    document.getElementById("sel_t1").value = "";
    document.getElementById("sel_t0").value = "";
    updateT1Options(); updateT0Options();
    render();
}

function latest() {
    let dates = DATA.all_dates;
    selEnd = dates[dates.length - 1];
    selStart = dates[Math.max(0, dates.length - 7)];
    document.getElementById("dp_start").value = selStart;
    document.getElementById("dp_end").value = selEnd;
    render();
}

function nav(l, a, b, c) {
    level = l; t2 = a || ""; t1 = b || ""; worker = c || "";
    document.getElementById("sel_t2").value = t2;
    document.getElementById("sel_t1").value = t1;
    document.getElementById("sel_t0").value = worker;
    updateT1Options(); updateT0Options();
    render();
}

function getDatesInRange(start, end) {
    return DATA.all_dates.filter(d => d >= start && d <= end);
}

function calcRangeStats(daily, start, end) {
    let dates = getDatesInRange(start, end);
    let num = 0, den = 0;
    dates.forEach(d => { if (daily[d]) { num += daily[d].num; den += daily[d].den; } });
    let ratio = den > 0 ? num / den : 0;
    return {num: num, den: den, ratio: ratio, pct: (ratio * 100).toFixed(1) + "%", dates: dates};
}

function getPrevRange(start, end) {
    let dates = DATA.all_dates;
    let startIdx = dates.indexOf(start);
    let endIdx = dates.indexOf(end);
    if (startIdx < 0 || endIdx < 0) return null;
    let len = endIdx - startIdx + 1;
    let prevEndIdx = startIdx - 1;
    let prevStartIdx = prevEndIdx - len + 1;
    if (prevStartIdx < 0) prevStartIdx = 0;
    if (prevEndIdx < 0) return null;
    return {start: dates[prevStartIdx], end: dates[prevEndIdx]};
}

function calcDayDeclineRanking() {
    let prev = getPrevRange(selStart, selEnd);
    if (!prev) return [];
    let ranking = [];
    if (level === "city") {
        // 上海市 → 下一层 T2
        DATA.t2_list.forEach(t2v => {
            let cur = calcRangeStats(DATA.t2_data[t2v].daily, selStart, selEnd);
            let prevStats = calcRangeStats(DATA.t2_data[t2v].daily, prev.start, prev.end);
            if (prevStats.ratio > 0 && cur.ratio > 0) {
                let decline = ((prevStats.ratio - cur.ratio) / prevStats.ratio) * 100;
                ranking.push({name: t2v, cur: cur, prev: prevStats, decline: decline});
            }
        });
    } else if (level === "t2" && t2) {
        // T2 → 下一层 T1
        let t1List = DATA.t2_data[t2].t1_list;
        t1List.forEach(t1v => {
            let k = t2 + "/" + t1v;
            if (!DATA.t1_data[k]) return;
            let cur = calcRangeStats(DATA.t1_data[k].daily, selStart, selEnd);
            let prevStats = calcRangeStats(DATA.t1_data[k].daily, prev.start, prev.end);
            if (prevStats.ratio > 0 && cur.ratio > 0) {
                let decline = ((prevStats.ratio - cur.ratio) / prevStats.ratio) * 100;
                ranking.push({name: t1v, cur: cur, prev: prevStats, decline: decline});
            }
        });
    } else if (level === "t1" && t2 && t1) {
        // T1 → 下一层 T0 作业人员
        let k = t2 + "/" + t1;
        if (DATA.t1_data[k]) {
            DATA.t1_data[k].workers.forEach(w => {
                let wkKey = t2 + "/" + t1 + "/" + w;
                if (!DATA.worker_data[wkKey]) return;
                let cur = calcRangeStats(DATA.worker_data[wkKey].daily, selStart, selEnd);
                let prevStats = calcRangeStats(DATA.worker_data[wkKey].daily, prev.start, prev.end);
                if (prevStats.ratio > 0 && cur.ratio > 0) {
                    let decline = ((prevStats.ratio - cur.ratio) / prevStats.ratio) * 100;
                    ranking.push({name: w, cur: cur, prev: prevStats, decline: decline});
                }
            });
        }
    }
    ranking.sort((a, b) => b.decline - a.decline);
    return ranking.slice(0, 3);
}

        DATA.t2_list.forEach(t2v => {

    } else if (level === "t2" && t2) {

function calcTargetGoal(summary) {
    const TARGET = 0.85;
    let endDate = new Date(selEnd + "T00:00:00");
    let year = endDate.getFullYear();
    let month = endDate.getMonth();
    let daysInMonth = new Date(year, month + 1, 0).getDate();
    
    // passed days: count dates in current month up to selEnd
    let passedDates = DATA.all_dates.filter(d => {
        let dObj = new Date(d + "T00:00:00");
        return dObj.getFullYear() === year && dObj.getMonth() === month && d <= selEnd;
    });
    let passedDays = passedDates.length;
    let remainingDays = daysInMonth - passedDays;
    
    let currentRatio = summary.month_this.ratio || 0;
    let timeProgress = (passedDays / daysInMonth) * 100;
    let goalProgress = (currentRatio / TARGET) * 100;
    
    let remainingPct = "-";
    let status = "normal";
    let isAchieved = false;
    
    if (remainingDays <= 0) {
        isAchieved = currentRatio >= TARGET;
        remainingPct = isAchieved ? "已达标" : "未达标";
        status = isAchieved ? "ok" : "danger";
    } else {
        let num = summary.month_this.num || 0;
        let den = summary.month_this.den || 0;
        if (den > 0 && passedDays > 0) {
            let avgDailyDen = den / passedDays;
            let remainingDen = avgDailyDen * remainingDays;
            let targetTotalNum = TARGET * (den + remainingDen);
            let remainingNum = targetTotalNum - num;
            if (remainingNum <= 0) {
                isAchieved = true;
                remainingPct = "已达标";
                status = "ok";
            } else if (remainingDen > 0) {
                let reqRatio = remainingNum / remainingDen;
                remainingPct = (reqRatio * 100).toFixed(1) + "%";
                status = reqRatio > TARGET ? "danger" : (reqRatio > TARGET * 0.9 ? "warn" : "normal");
            }
        }
    }
    
    return {
        target: (TARGET * 100).toFixed(0) + "%",
        current: (currentRatio * 100).toFixed(1) + "%",
        timeProgress: timeProgress.toFixed(1),
        goalProgress: goalProgress.toFixed(1),
        remainingDays: remainingDays,
        remainingPct: remainingPct,
        status: status,
        passedDays: passedDays,
        daysInMonth: daysInMonth
    };
}

function getWeekOfSelectedDate() {
    let d = new Date(selEnd + "T00:00:00");
    let day = d.getDay();
    let mondayOffset = day === 0 ? -6 : (1 - day);
    let monday = new Date(d);
    monday.setDate(d.getDate() + mondayOffset);
    let sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);
    function fmt(dt) {
        let y = dt.getFullYear();
        let m = String(dt.getMonth() + 1).padStart(2, '0');
        let dd = String(dt.getDate()).padStart(2, '0');
        return y + '-' + m + '-' + dd;
    }
    return {mon: fmt(monday), sun: fmt(sunday), dates: DATA.all_dates.filter(dd => dd >= fmt(monday) && dd <= fmt(sunday))};
}

function getMonthOfSelectedDate() {
    let parts = selEnd.split('-');
    let first = parts[0] + '-' + parts[1] + '-01';
    return {first: first, last: selEnd, dates: DATA.all_dates.filter(dd => dd >= first && dd <= selEnd)};
}

function ld() {
    if (level === "city") return {trend: DATA.city_trend, summary: DATA.city_summary, label: DATA.city};
    if (level === "t2") return {trend: DATA.t2_data[t2].trend, summary: DATA.t2_data[t2].summary, label: t2};
    if (level === "t1") { let k = t2 + "/" + t1; return {trend: DATA.t1_data[k].trend, summary: DATA.t1_data[k].summary, label: t1}; }
    if (level === "worker") { let k = t2 + "/" + t1 + "/" + worker; let wd = DATA.worker_data[k]; return {trend: wd.daily, summary: wd.summary, label: worker}; }
}

function getWeekRange(ds) {
    let d = new Date(ds + "T00:00:00"); let dow = d.getDay(); let mon = dow === 0 ? 6 : dow - 1;
    let monday = new Date(d); monday.setDate(d.getDate() - mon);
    let sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
    function fmt(dt) { let y = dt.getFullYear(); let m = String(dt.getMonth()+1).padStart(2,'0'); let dd = String(dt.getDate()).padStart(2,'0'); return y + '-' + m + '-' + dd; }
    return [fmt(monday), fmt(sunday)];
}

function buildSparkline(values, color, fillOpacity) {
    if (!values || values.length === 0) {
        return '<svg viewBox="0 0 600 180" preserveAspectRatio="none"><text x="300" y="90" text-anchor="middle" fill="var(--text-muted)" font-size="14" font-weight="500">暂无数据</text></svg>';
    }
    let mn = Math.min(...values), mx = Math.max(...values);
    if (mx === mn) mx = mn + 1;
    let w = 600, h = 180, pad = 30;
    let pts = values.map((v, i) => {
        let x = pad + (i / (values.length - 1)) * (w - pad * 2);
        let y = h - pad - ((v - mn) / (mx - mn)) * (h - pad * 2);
        return x.toFixed(1) + "," + y.toFixed(1);
    });
    let path = "M" + pts.join(" L");
    let area = path + " L" + pts[pts.length - 1].split(",")[0] + "," + (h - pad) + " L" + pad + "," + (h - pad) + " Z";
    let circles = pts.map((p, i) => { let xy = p.split(","); let isCurrent = i === values.length - 1; return '<circle cx="' + xy[0] + '" cy="' + xy[1] + '" r="' + (isCurrent ? 5 : 3) + '" fill="' + (isCurrent ? color : '#fff') + '" stroke="' + color + '" stroke-width="2"/>'; }).join("");
    let gridLines = "";
    for (let i = 0; i <= 4; i++) {
        let y = pad + (i / 4) * (h - pad * 2);
        gridLines += '<line x1="' + pad + '" y1="' + y + '" x2="' + (w - pad) + '" y2="' + y + '" stroke="#f1f5f9" stroke-width="1"/>';
    }
    return '<svg viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none"><defs><linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="' + color + '" stop-opacity="' + fillOpacity + '"/><stop offset="100%" stop-color="' + color + '" stop-opacity="0.05"/></linearGradient></defs>' + gridLines + '<path d="' + area + '" fill="url(#areaGrad)"/><path d="' + path + '" fill="none" stroke="' + color + '" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>' + circles + '</svg>';
}

function renderRankItem(item, idx) {
    let cls = idx === 0 ? "g1" : (idx === 1 ? "g2" : "g3");
    let curPct = (item.cur.ratio * 100).toFixed(1) + "%";
    let prevPct = (item.prev.ratio * 100).toFixed(1) + "%";
    let isDecline = item.decline > 0.01;
    let isImprove = item.decline < -0.01;
    let arrow = isDecline ? "▼" : (isImprove ? "▲" : "→");
    let pctColor = isDecline ? 'var(--danger)' : (isImprove ? 'var(--success)' : 'var(--primary)');
    let label = isDecline ? "降幅" : (isImprove ? "增幅" : "持平");
    return '<div class="rank-item"><div class="rank-num ' + cls + '">' + (idx + 1) + '</div><div class="rank-info"><div class="rank-name">' + item.name + '</div><div class="rank-detail">' + prevPct + ' → ' + curPct + '</div></div><div class="rank-val"><div class="rank-pct" style="color:' + pctColor + '">' + arrow + Math.abs(item.decline).toFixed(1) + '%</div><div class="rank-change">' + label + '</div></div></div>';
}

function render() {
    if (!DATA) return;
    let d = ld();
    let rangeDates = getDatesInRange(selStart, selEnd);
    let s = d.summary;

    let h = "";
    h += '<div class="breadcrumb">';
    h += '<span class="' + (level === "city" ? "active" : "") + '" onclick="nav(\'city\')">' + DATA.city + '</span>';
    if (level !== "city" && t2) h += '<span class="arrow">▶</span><span class="' + (level === "t2" ? "active" : "") + '" onclick="nav(\'t2\',\'' + t2 + '\')">' + t2 + '</span>';
    if ((level === "t1" || level === "worker") && t1) h += '<span class="arrow">▶</span><span class="' + (level === "t1" ? "active" : "") + '" onclick="nav(\'t1\',\'' + t2 + '\',\'' + t1 + '\')">' + t1 + '</span>';
    if (level === "worker") h += '<span class="arrow">▶</span><span class="active">' + worker + '</span>';
    h += '</div>';

    // Target goal calculation
    let goal = calcTargetGoal(s);

    // Range stats for cards
    let curStats = calcRangeStats(d.trend, selStart, selEnd);
    let prevRange = getPrevRange(selStart, selEnd);
    let prevStats = prevRange ? calcRangeStats(d.trend, prevRange.start, prevRange.end) : {ratio: 0, pct: "-"};
    let dod = 0;
    if (prevStats.ratio > 0) dod = (curStats.ratio - prevStats.ratio) * 100;
    let dodHtml = Math.abs(dod) > 0.001 ? '<span class="change ' + (dod >= 0 ? "up" : "down") + '">' + (dod >= 0 ? "▲" : "▼") + Math.abs(dod).toFixed(1) + 'pp</span>' : '';

    // Week/Month achievements based on selected date (not system today)
    let wkInfo = getWeekOfSelectedDate();
    let moInfo = getMonthOfSelectedDate();
    let weekAchieve = calcRangeStats(d.trend, wkInfo.mon, wkInfo.sun);
    let monthAchieve = calcRangeStats(d.trend, moInfo.first, moInfo.last);

    // MoM calculations
    // Day MoM
    let latestDay = selEnd;
    let prevDayIdx = DATA.all_dates.indexOf(latestDay);
    let dayBefore = prevDayIdx > 0 ? DATA.all_dates[prevDayIdx - 1] : null;
    let dayMoM = 0, dayMoMHtml = '-', dayTrendCls = 'flat', dayArrow = '→', dayTrendLabel = '持平';
    if (dayBefore && d.trend[latestDay] && d.trend[dayBefore]) {
        if (d.trend[dayBefore].ratio > 0) {
            dayMoM = ((d.trend[latestDay].ratio - d.trend[dayBefore].ratio) / d.trend[dayBefore].ratio) * 100;
        }
        dayMoMHtml = Math.abs(dayMoM) > 0.01 ? (dayMoM >= 0 ? '+' : '') + dayMoM.toFixed(1) + '%' : '持平';
        dayTrendCls = dayMoM > 0.01 ? 'up' : (dayMoM < -0.01 ? 'down' : 'flat');
        dayArrow = dayMoM > 0.01 ? '▲' : (dayMoM < -0.01 ? '▼' : '→');
        dayTrendLabel = dayMoM > 0.01 ? '上升' : (dayMoM < -0.01 ? '下降' : '持平');
    }
    if (dayMoMHtml === '-') { dayTrendCls = 'flat'; dayArrow = '→'; dayTrendLabel = '持平'; }

    // Week MoM
    let prevWkRange = getPrevRange(wkInfo.mon, wkInfo.sun);
    let prevWeekStats = prevWkRange ? calcRangeStats(d.trend, prevWkRange.start, prevWkRange.end) : {ratio: 0, pct: '-'};
    let weekMoM = 0, weekMoMHtml = '-', weekTrendCls = 'flat', weekArrow = '→', weekTrendLabel = '持平';
    if (prevWeekStats.ratio > 0) {
        weekMoM = ((weekAchieve.ratio - prevWeekStats.ratio) / prevWeekStats.ratio) * 100;
        weekMoMHtml = Math.abs(weekMoM) > 0.01 ? (weekMoM >= 0 ? '+' : '') + weekMoM.toFixed(1) + '%' : '持平';
        weekTrendCls = weekMoM > 0.01 ? 'up' : (weekMoM < -0.01 ? 'down' : 'flat');
        weekArrow = weekMoM > 0.01 ? '▲' : (weekMoM < -0.01 ? '▼' : '→');
        weekTrendLabel = weekMoM > 0.01 ? '上升' : (weekMoM < -0.01 ? '下降' : '持平');
    }
    if (weekMoMHtml === '-') { weekTrendCls = 'flat'; weekArrow = '→'; weekTrendLabel = '持平'; }

    // Month MoM
    let prevMoRange = getPrevRange(moInfo.first, moInfo.last);
    let prevMonthStats = prevMoRange ? calcRangeStats(d.trend, prevMoRange.start, prevMoRange.end) : {ratio: 0, pct: '-'};
    let monthMoM = 0, monthMoMHtml = '-', monthTrendCls = 'flat', monthArrow = '→', monthTrendLabel = '持平';
    if (prevMonthStats.ratio > 0) {
        monthMoM = ((monthAchieve.ratio - prevMonthStats.ratio) / prevMonthStats.ratio) * 100;
        monthMoMHtml = Math.abs(monthMoM) > 0.01 ? (monthMoM >= 0 ? '+' : '') + monthMoM.toFixed(1) + '%' : '持平';
        monthTrendCls = monthMoM > 0.01 ? 'up' : (monthMoM < -0.01 ? 'down' : 'flat');
        monthArrow = monthMoM > 0.01 ? '▲' : (monthMoM < -0.01 ? '▼' : '→');
        monthTrendLabel = monthMoM > 0.01 ? '上升' : (monthMoM < -0.01 ? '下降' : '持平');
    }
    if (monthMoMHtml === '-') { monthTrendCls = 'flat'; monthArrow = '→'; monthTrendLabel = '持平'; }

    // === KPI Cards ===
    h += '<div class="cards">';
    h += '<div class="card"><div class="bar blue"></div><div class="card-body"><div class="label">所选时段 (' + rangeDates.length + '天)</div><div class="value-wrap"><div class="value">' + curStats.pct + '</div>' + dodHtml + '</div><div class="sub">' + selStart + ' ~ ' + selEnd + ' · 推荐 ' + Math.round(curStats.num) + ' / 全量 ' + Math.round(curStats.den) + '</div></div></div>';
    h += '<div class="card"><div class="bar indigo"></div><div class="card-body"><div class="label">周度达成</div><div class="value-wrap"><div class="value">' + weekAchieve.pct + '</div></div><div class="sub">' + wkInfo.mon + ' ~ ' + wkInfo.sun + ' · 推荐 ' + Math.round(weekAchieve.num) + ' / 全量 ' + Math.round(weekAchieve.den) + '</div></div></div>';
    h += '<div class="card"><div class="bar violet"></div><div class="card-body"><div class="label">月度达成</div><div class="value-wrap"><div class="value">' + monthAchieve.pct + '</div></div><div class="sub">' + moInfo.first + ' ~ ' + moInfo.last + ' · 推荐 ' + Math.round(monthAchieve.num) + ' / 全量 ' + Math.round(monthAchieve.den) + '</div></div></div>';
    h += '<div class="card"><div class="bar gold"></div><div class="card-body"><div class="label">日度环比</div><div class="value-wrap"><div class="value">' + dayMoMHtml + '</div><div class="sub">' + latestDay.slice(5) + ' vs ' + (dayBefore ? dayBefore.slice(5) : '-') + ' · ' + (d.trend[latestDay] ? d.trend[latestDay].pct : '-') + '</div></div></div>';
    h += '</div>';

    // === MoM Creative Indicator Boxes ===
    h += '<div class="mom-grid">';
    h += '<div class="mom-card day"><div class="mom-icon">日</div><div class="mom-label">日度环比</div><div class="mom-value">' + dayMoMHtml + '</div><div class="mom-sub">' + latestDay.slice(5) + ' vs ' + (dayBefore ? dayBefore.slice(5) : '-') + '</div><div class="mom-trend ' + dayTrendCls + '">' + dayArrow + ' ' + dayTrendLabel + '</div></div>';
    h += '<div class="mom-card week"><div class="mom-icon">周</div><div class="mom-label">周度环比</div><div class="mom-value">' + weekMoMHtml + '</div><div class="mom-sub">本周 vs 上周</div><div class="mom-trend ' + weekTrendCls + '">' + weekArrow + ' ' + weekTrendLabel + '</div></div>';
    h += '<div class="mom-card month"><div class="mom-icon">月</div><div class="mom-label">月度环比</div><div class="mom-value">' + monthMoMHtml + '</div><div class="mom-sub">本月 vs 上月同期</div><div class="mom-trend ' + monthTrendCls + '">' + monthArrow + ' ' + monthTrendLabel + '</div></div>';
    h += '</div>';

    // Goal Ring Chart
    let outerR = 80, innerR = 56, outerStroke = 14, innerStroke = 10;
    let outerC = 2 * Math.PI * outerR;
    let innerC = 2 * Math.PI * innerR;
    let goalP = Math.min(goal.goalProgress, 100);
    let timeP = Math.min(goal.timeProgress, 100);
    let isAchieved = goal.goalProgress >= 100;
    let goalColor = isAchieved ? 'var(--success)' : (goal.goalProgress >= 88 ? 'var(--primary)' : 'var(--danger)');
    let goalDot = isAchieved ? '#10b981' : (goal.goalProgress >= 88 ? '#2563eb' : '#ef4444');
    let timeColor = '#94a3b8';
    let timeDot = '#94a3b8';
    let catchColor = isAchieved ? 'var(--success)' : (goal.status === 'danger' ? 'var(--danger)' : 'var(--primary)');
    let statusText = isAchieved ? '已达标' : (goal.status === 'danger' ? '严重落后' : (goal.status === 'warn' ? '需追赶' : '正常'));
    let statusCls = isAchieved ? 'ok' : (goal.status === 'danger' ? 'danger' : (goal.status === 'warn' ? 'warn' : 'normal'));
    let arrow = isAchieved ? '▲' : '▼';
    let trendArrow = goal.goalProgress >= goal.timeProgress ? '▲' : '▼';
    let trendColor = goal.goalProgress >= goal.timeProgress ? 'var(--success)' : 'var(--danger)';
    
    h += '<div class="goal-ring-panel">';
    h += '<div class="goal-ring-wrap">';
    h += '<svg viewBox="0 0 200 200">';
    // Outer ring track (goal)
    h += '<circle cx="100" cy="100" r="' + outerR + '" class="ring-track" stroke-width="' + outerStroke + '"/>';
    // Outer ring fill (goal progress)
    h += '<circle cx="100" cy="100" r="' + outerR + '" class="ring-goal" stroke="' + goalColor + '" stroke-width="' + outerStroke + '" stroke-dasharray="' + (outerC * goalP / 100).toFixed(2) + ' ' + outerC.toFixed(2) + '" transform="rotate(-90 100 100)"/>';
    // Inner ring track (time)
    h += '<circle cx="100" cy="100" r="' + innerR + '" class="ring-track" stroke-width="' + innerStroke + '"/>';
    // Inner ring fill (time progress)
    h += '<circle cx="100" cy="100" r="' + innerR + '" class="ring-time" stroke="' + timeColor + '" stroke-width="' + innerStroke + '" stroke-dasharray="' + (innerC * timeP / 100).toFixed(2) + ' ' + innerC.toFixed(2) + '" transform="rotate(-90 100 100)"/>';
    h += '</svg>';
    h += '<div class="ring-center">';
    h += '<div class="label">应追赶占比</div>';
    h += '<div class="value" style="color:' + catchColor + '">' + goal.remainingPct + '</div>';
    h += '<div class="sub">' + goal.remainingDays + ' 天内需保持</div>';
    h += '</div>';
    h += '</div>';
    // Legend
    h += '<div class="ring-legend">';
    h += '<div class="ring-legend-item">';
    h += '<div class="ring-legend-dot" style="background:' + goalDot + '"></div>';
    h += '<div class="ring-legend-info">';
    h += '<div class="ring-legend-title">月度目标达成</div>';
    h += '<div class="ring-legend-desc">当前 ' + goal.current + ' / 目标 ' + goal.target + ' · 进度 ' + goal.goalProgress + '%</div>';
    h += '</div>';
    h += '<div class="ring-legend-val" style="color:' + goalColor + '">' + goal.current + '<span class="ring-status ' + statusCls + '">' + statusText + '</span></div>';
    h += '</div>';
    h += '<div class="ring-legend-item">';
    h += '<div class="ring-legend-dot" style="background:' + timeDot + '"></div>';
    h += '<div class="ring-legend-info">';
    h += '<div class="ring-legend-title">时间进度</div>';
    h += '<div class="ring-legend-desc">已过 ' + goal.passedDays + ' 天 / 本月共 ' + goal.daysInMonth + ' 天</div>';
    h += '</div>';
    h += '<div class="ring-legend-val" style="color:' + timeColor + '">' + goal.timeProgress + '%</div>';
    h += '</div>';
    h += '<div class="ring-legend-item">';
    h += '<div class="ring-legend-dot" style="background:' + catchColor + '"></div>';
    h += '<div class="ring-legend-info">';
    h += '<div class="ring-legend-title">剩余应追赶</div>';
    h += '<div class="ring-legend-desc">' + goal.remainingDays + ' 天内需保持此占比才能达标</div>';
    h += '</div>';
    h += '<div class="ring-legend-val" style="color:' + catchColor + '">' + goal.remainingPct + '</div>';
    h += '</div>';
    h += '</div>';
    h += '</div>';

    // Personnel Achievement Cards (sorted by month achievement, moved above decline ranking)
    if (level === "city") {
        let t2Sorted = DATA.t2_list.slice();
        let moFirst = moInfo.first, moLast = moInfo.last;
        t2Sorted.sort((a, b) => {
            let ra = calcRangeStats(DATA.t2_data[a].daily, moFirst, moLast);
            let rb = calcRangeStats(DATA.t2_data[b].daily, moFirst, moLast);
            return rb.ratio - ra.ratio;
        });
        h += '<div class="achieve-section">';
        h += '<h3>T2 负责人 · 月度达成排序 (' + moLast.slice(0,7) + ')</h3>';
        h += '<div class="achieve-grid">';
        for (let i = 0; i < t2Sorted.length; i++) {
            let t2v = t2Sorted[i];
            let s2 = DATA.t2_data[t2v].summary;
            let moAch = calcRangeStats(DATA.t2_data[t2v].daily, moFirst, moLast);
            let rankCls = i === 0 ? 'rank-1' : (i === 1 ? 'rank-2' : (i === 2 ? 'rank-3' : ''));
            let achCls = moAch.ratio >= 0.85 ? 'green' : (moAch.ratio >= 0.80 ? 'amber' : 'red');
            h += '<div class="achieve-item ' + rankCls + '" onclick="nav(\'t2\',\'' + t2v + '\')">';
            if (i < 3) h += '<div class="achieve-rank">' + (i + 1) + '</div>';
            h += '<div class="name">' + t2v + '</div>';
            h += '<div class="achieve-pct ' + achCls + '">' + moAch.pct + '</div>';
            h += '<div class="achieve-sub">本周 <span>' + s2.week_this.pct + '</span> · 本月 <span>' + s2.month_this.pct + '</span></div>';
            h += '</div>';
        }
        h += '</div></div>';
    } else if (level === "t2") {
        let t1s = DATA.t2_data[t2].t1_list.slice();
        let moFirst = moInfo.first, moLast = moInfo.last;
        t1s.sort((a, b) => {
            let ka = t2 + "/" + a, kb = t2 + "/" + b;
            let ra = calcRangeStats(DATA.t1_data[ka].daily, moFirst, moLast);
            let rb = calcRangeStats(DATA.t1_data[kb].daily, moFirst, moLast);
            return rb.ratio - ra.ratio;
        });
        h += '<div class="achieve-section">';
        h += '<h3>T1 · 月度达成排序 (' + moLast.slice(0,7) + ')</h3>';
        h += '<div class="achieve-grid">';
        for (let i = 0; i < t1s.length; i++) {
            let t1v = t1s[i];
            let kk = t2 + "/" + t1v;
            let s1 = DATA.t1_data[kk].summary;
            let moAch = calcRangeStats(DATA.t1_data[kk].daily, moFirst, moLast);
            let rankCls = i === 0 ? 'rank-1' : (i === 1 ? 'rank-2' : (i === 2 ? 'rank-3' : ''));
            let achCls = moAch.ratio >= 0.85 ? 'green' : (moAch.ratio >= 0.80 ? 'amber' : 'red');
            h += '<div class="achieve-item ' + rankCls + '" onclick="nav(\'t1\',\'' + t2 + '\',\'' + t1v + '\')">';
            if (i < 3) h += '<div class="achieve-rank">' + (i + 1) + '</div>';
            h += '<div class="name">' + t1v + '</div>';
            h += '<div class="achieve-pct ' + achCls + '">' + moAch.pct + '</div>';
            h += '<div class="achieve-sub">本周 <span>' + s1.week_this.pct + '</span> · 本月 <span>' + s1.month_this.pct + '</span></div>';
            h += '</div>';
        }
        h += '</div></div>';
    } else if (level === "t1") {
        let kk = t2 + "/" + t1;
        let workers = DATA.t1_data[kk].workers.slice();
        let moFirst = moInfo.first, moLast = moInfo.last;
        workers.sort((a, b) => {
            let wkA = t2 + "/" + t1 + "/" + a;
            let wkB = t2 + "/" + t1 + "/" + b;
            let ra = calcRangeStats(DATA.worker_data[wkA].daily, moFirst, moLast);
            let rb = calcRangeStats(DATA.worker_data[wkB].daily, moFirst, moLast);
            return rb.ratio - ra.ratio;
        });
        h += '<div class="achieve-section">';
        h += '<h3>T0 作业人员 · 月度达成排序 (' + moLast.slice(0,7) + ')</h3>';
        h += '<div class="achieve-grid">';
        for (let i = 0; i < workers.length; i++) {
            let w = workers[i];
            let wk = t2 + "/" + t1 + "/" + w;
            let sw = DATA.worker_data[wk].summary;
            let moAch = calcRangeStats(DATA.worker_data[wk].daily, moFirst, moLast);
            let rankCls = i === 0 ? 'rank-1' : (i === 1 ? 'rank-2' : (i === 2 ? 'rank-3' : ''));
            let achCls = moAch.ratio >= 0.85 ? 'green' : (moAch.ratio >= 0.80 ? 'amber' : 'red');
            h += '<div class="achieve-item ' + rankCls + '" onclick="nav(\'worker\',\'' + t2 + '\',\'' + t1 + '\',\'' + w + '\')">';
            if (i < 3) h += '<div class="achieve-rank">' + (i + 1) + '</div>';
            h += '<div class="name">' + w + '</div>';
            h += '<div class="achieve-pct ' + achCls + '">' + moAch.pct + '</div>';
            h += '<div class="achieve-sub">本周 <span>' + sw.week_this.pct + '</span> · 本月 <span>' + sw.month_this.pct + '</span></div>';
            h += '</div>';
        }
        h += '</div></div>';
    }

    // Decline Ranking
    let dayRank = calcDayDeclineRanking();
    let weekRank = calcWeekDeclineRanking();
    if (dayRank.length > 0 || weekRank.length > 0) {
        h += '<div class="rank-grid">';
        h += '<div class="rank-panel"><h3>日度降幅前三</h3><div class="rank-list">';
        if (dayRank.length === 0) h += '<div class="rank-item"><div class="rank-info"><div class="rank-name">数据不足</div></div></div>';
        dayRank.forEach((item, idx) => { h += renderRankItem(item, idx); });
        h += '</div></div>';
        h += '<div class="rank-panel"><h3 class="week">周度降幅前三</h3><div class="rank-list">';
        if (weekRank.length === 0) h += '<div class="rank-item"><div class="rank-info"><div class="rank-name">数据不足</div></div></div>';
        weekRank.forEach((item, idx) => { h += renderRankItem(item, idx); });
        h += '</div></div>';
        h += '</div>';
    }

    // Main Grid
    h += '<div class="main-grid">';
    h += '<div class="panel trend-panel"><h3>日度趋势</h3>';
    h += '<div class="trend-wrap">';
    h += '<div class="trend-values">';
    for (let i = 0; i < rangeDates.length; i++) {
        let t = d.trend[rangeDates[i]] || {pct: "-", num: 0, den: 0};
        let cls = rangeDates[i] === selEnd ? "current" : "";
        h += '<div class="trend-val"><div class="date">' + rangeDates[i].slice(5) + '</div><div class="pct ' + cls + '">' + t.pct + '</div><div class="raw">' + Math.round(t.num) + ' / ' + Math.round(t.den) + '</div></div>';
    }
    h += '</div>';
    let vals = rangeDates.map(da => d.trend[da] ? d.trend[da].ratio * 100 : 0);
    h += '<div class="trend-chart">' + buildSparkline(vals, "#2563eb", "0.2") + '</div>';
    h += '</div></div>';

    h += '<div class="panel compare-section"><h3>周/月对比</h3>';
    h += '<h4>周度</h4>';
    h += '<div class="compare-grid">';
    h += '<div class="cw current"><div class="label">本周 (' + wkInfo.mon.slice(5) + '~' + wkInfo.sun.slice(5) + ')</div><div class="val">' + weekAchieve.pct + '</div><div class="sub">' + Math.round(weekAchieve.num) + ' / ' + Math.round(weekAchieve.den) + '</div></div>';
    h += '<div class="cw past"><div class="label">上周</div><div class="val">' + prevWeekStats.pct + '</div><div class="sub">' + Math.round(prevWeekStats.num) + ' / ' + Math.round(prevWeekStats.den) + '</div></div>';
    h += '</div>';
    h += '<h4>月度</h4>';
    h += '<div class="compare-grid">';
    h += '<div class="cw current"><div class="label">本月 (' + moInfo.first.slice(5) + '~' + moInfo.last.slice(5) + ')</div><div class="val">' + monthAchieve.pct + '</div><div class="sub">' + Math.round(monthAchieve.num) + ' / ' + Math.round(monthAchieve.den) + '</div></div>';
    h += '<div class="cw past"><div class="label">上月同期</div><div class="val">' + prevMonthStats.pct + '</div><div class="sub">' + Math.round(prevMonthStats.num) + ' / ' + Math.round(prevMonthStats.den) + '</div></div>';
    h += '</div></div></div>';

    document.getElementById("app").innerHTML = h;
}
</script>
</body>
</html>
