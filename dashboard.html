
<!DOCTYPE html>

<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>系统推荐卸车占比 - 上海市</title>

<style>

:root{

  --primary:#2563eb;--primary-light:#eff6ff;--primary-dark:#1d4ed8;

  --success:#10b981;--success-bg:#ecfdf5;--danger:#ef4444;--danger-bg:#fef2f2;

  --text-main:#0f172a;--text-secondary:#64748b;--text-muted:#94a3b8;

  --bg:#f8fafc;--card-bg:#ffffff;--border:#e2e8f0;--border-light:#f1f5f9;

  --shadow:0 1px 3px rgba(0,0,0,0.04),0 1px 2px rgba(0,0,0,0.02);

  --shadow-hover:0 10px 25px -5px rgba(0,0,0,0.06),0 4px 10px -2px rgba(0,0,0,0.03);

  --radius:16px;--radius-sm:10px;--radius-xs:6px;

}

*{margin:0;padding:0;box-sizing:border-box}

body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text-main);min-width:1200px;line-height:1.5}



/* Header */

.header{background:var(--card-bg);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow);flex-wrap:wrap;gap:12px}

.header h1{font-size:20px;font-weight:700;color:var(--text-main);letter-spacing:-0.3px}

.header h1 span{font-weight:400;color:var(--text-muted);margin-left:6px}

.header-controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap}

.filter-group{display:flex;align-items:center;gap:6px}

.filter-group label{font-size:12px;color:var(--text-muted);font-weight:600;white-space:nowrap}

.header input[type="date"],.header select{padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius-xs);font-size:13px;background:#fff;color:var(--text-main);outline:none;transition:border-color .2s;font-family:inherit;min-width:110px}

.header input[type="date"]:focus,.header select:focus{border-color:var(--primary)}

.header .btn{padding:7px 16px;border:none;border-radius:var(--radius-xs);cursor:pointer;font-size:13px;font-weight:600;background:var(--primary-light);color:var(--primary);transition:all .2s;font-family:inherit}

.header .btn:hover{background:var(--primary);color:#fff}

.header .btn.secondary{background:#f1f5f9;color:var(--text-secondary)}

.header .btn.secondary:hover{background:var(--border);color:var(--text-main)}



/* Container */

.container{max-width:1400px;margin:0 auto;padding:24px 32px}



/* Breadcrumb */

.breadcrumb{display:flex;align-items:center;gap:8px;margin-bottom:20px;font-size:14px}

.breadcrumb span{padding:7px 18px;border-radius:20px;cursor:pointer;background:#fff;border:1px solid var(--border-light);color:var(--text-secondary);transition:all .2s;font-weight:500;box-shadow:var(--shadow)}

.breadcrumb span:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}

.breadcrumb span.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 2px 8px rgba(37,99,235,0.25)}

.breadcrumb .arrow{color:var(--text-muted);font-size:12px;margin:0 2px}



/* KPI Cards */

.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:24px}

.card{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border-light);overflow:hidden;transition:transform .25s,box-shadow .25s}

.card:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover)}

.card .bar{height:5px;width:100%}

.card .bar.blue{background:linear-gradient(90deg,#3b82f6,#2563eb)}

.card .bar.indigo{background:linear-gradient(90deg,#6366f1,#4f46e5)}

.card .bar.violet{background:linear-gradient(90deg,#8b5cf6,#7c3aed)}

.card .bar.slate{background:linear-gradient(90deg,#94a3b8,#64748b)}

.card .bar.gold{background:linear-gradient(90deg,#f59e0b,#d97706)}

.card-body{padding:20px 24px}

.card .label{font-size:12px;color:var(--text-muted);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}

.card .value-wrap{display:flex;align-items:baseline;gap:8px;margin-bottom:6px;flex-wrap:wrap}

.card .value{font-size:32px;font-weight:800;color:var(--text-main);letter-spacing:-0.5px;line-height:1}

.card .sub{font-size:13px;color:var(--text-secondary);font-weight:500}

.card .change{font-size:13px;font-weight:700;padding:2px 8px;border-radius:6px;display:inline-flex;align-items:center;gap:3px}

.card .change.up{color:var(--success);background:var(--success-bg)}

.card .change.down{color:var(--danger);background:var(--danger-bg)}



/* Goal Ring Chart */

.goal-ring-panel{background:var(--card-bg);border-radius:var(--radius);padding:24px 32px;box-shadow:var(--shadow);border:1px solid var(--border-light);display:flex;align-items:center;gap:40px;flex-wrap:wrap;margin-bottom:24px}

.goal-ring-wrap{position:relative;display:flex;align-items:center;justify-content:center;flex-shrink:0}

.goal-ring-wrap svg{width:210px;height:210px}

.ring-track{fill:none;stroke:var(--border-light);stroke-linecap:round}

.ring-goal{fill:none;stroke-linecap:round;transition:stroke-dasharray .6s ease}

.ring-time{fill:none;stroke-linecap:round;transition:stroke-dasharray .6s ease}

.ring-center{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}

.ring-center .label{font-size:12px;color:var(--text-muted);font-weight:600;margin-bottom:4px;white-space:nowrap}

.ring-center .value{font-size:30px;font-weight:800;letter-spacing:-0.5px;line-height:1}

.ring-center .sub{font-size:11px;color:var(--text-muted);font-weight:500;margin-top:4px;white-space:nowrap}

.ring-legend{display:flex;flex-direction:column;gap:18px;flex:1;min-width:220px}

.ring-legend-item{display:flex;align-items:center;gap:12px}

.ring-legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

.ring-legend-info{flex:1}

.ring-legend-title{font-size:14px;font-weight:600;color:var(--text-main);margin-bottom:2px}

.ring-legend-desc{font-size:12px;color:var(--text-muted);font-weight:500}

.ring-legend-val{font-size:18px;font-weight:800;letter-spacing:-0.3px;flex-shrink:0}

.ring-status{font-size:12px;font-weight:600;padding:2px 10px;border-radius:10px;display:inline-block;margin-left:8px}

.ring-status.ok{background:var(--success-bg);color:var(--success)}

.ring-status.warn{background:#fffbeb;color:#d97706}

.ring-status.danger{background:var(--danger-bg);color:var(--danger)}

.ring-status.normal{background:var(--primary-light);color:var(--primary)}



/* Decline Ranking */

.rank-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}

.rank-panel{background:var(--card-bg);border-radius:var(--radius);padding:20px 24px;box-shadow:var(--shadow);border:1px solid var(--border-light)}

.rank-panel h3{font-size:15px;margin-bottom:16px;color:var(--text-main);font-weight:700;letter-spacing:-0.2px;display:flex;align-items:center;gap:8px}

.rank-panel h3::before{content:'';display:inline-block;width:4px;height:16px;border-radius:2px;background:var(--danger)}

.rank-panel h3.week::before{background:var(--primary)}

.rank-list{display:flex;flex-direction:column;gap:10px}

.rank-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:var(--radius-xs);background:#f8fafc;border:1px solid var(--border-light);transition:all .2s}

.rank-item:hover{border-color:var(--border);background:#fff}

.rank-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0}

.rank-num.g1{background:linear-gradient(135deg,#ef4444,#dc2626)}

.rank-num.g2{background:linear-gradient(135deg,#f97316,#ea580c)}

.rank-num.g3{background:linear-gradient(135deg,#f59e0b,#d97706)}

.rank-info{flex:1;min-width:0}

.rank-name{font-size:14px;font-weight:600;color:var(--text-main);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.rank-detail{font-size:12px;color:var(--text-muted);font-weight:500}

.rank-val{text-align:right;flex-shrink:0}

.rank-pct{font-size:18px;font-weight:800;color:var(--danger);letter-spacing:-0.3px}

.rank-change{font-size:11px;color:var(--text-muted);font-weight:500}



/* Main Grid */

.main-grid{display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:24px}

.panel{background:var(--card-bg);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);border:1px solid var(--border-light)}

.panel h3{font-size:15px;margin-bottom:20px;color:var(--text-main);font-weight:700;letter-spacing:-0.2px;display:flex;align-items:center;gap:8px}

.panel h3::before{content:'';display:inline-block;width:4px;height:16px;border-radius:2px;background:var(--primary)}



/* Trend Chart */

.trend-panel{min-height:320px}

.trend-wrap{display:flex;flex-direction:column;gap:16px}

.trend-values{display:flex;gap:8px;justify-content:space-between;margin-bottom:8px}

.trend-val{text-align:center;flex:1;padding:10px 4px;border-radius:var(--radius-xs);transition:background .2s}

.trend-val:hover{background:var(--primary-light)}

.trend-val .date{font-size:12px;color:var(--text-muted);margin-bottom:6px;font-weight:500}

.trend-val .pct{font-size:16px;font-weight:700;color:var(--text-secondary);transition:color .2s}

.trend-val .pct.current{color:var(--primary);font-size:20px}

.trend-val:hover .pct{color:var(--primary)}

.trend-val .raw{font-size:11px;color:var(--text-muted);margin-top:4px;white-space:nowrap}

.trend-chart{width:100%;height:180px;position:relative}

.trend-chart svg{width:100%;height:100%;display:block}



/* Compare Grid */

.compare-section h4{font-size:12px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px;margin-top:4px}

.compare-section h4:first-of-type{margin-top:0}

.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}

.cw{padding:16px;border-radius:var(--radius-sm);text-align:center;border:1px solid var(--border-light);transition:all .2s}

.cw:hover{border-color:var(--primary);box-shadow:0 2px 8px rgba(37,99,235,0.08)}

.cw.current{background:var(--primary-light);border-color:var(--primary)}

.cw.past{background:#f8fafc;border-color:var(--border-light)}

.cw .label{font-size:12px;color:var(--text-muted);margin-bottom:6px;font-weight:600}

.cw .val{font-size:26px;font-weight:800;letter-spacing:-0.5px}

.cw.current .val{color:var(--primary)}

.cw.past .val{color:var(--text-secondary)}

.cw .sub{font-size:11px;color:var(--text-muted);margin-top:6px;font-weight:500}



/* Drill-down Grid */

.drill-panel{margin-bottom:24px}

.drill-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;margin-top:16px}

.t1-item{padding:20px;border-radius:var(--radius-sm);background:var(--card-bg);border:1px solid var(--border);cursor:pointer;transition:all .2s;position:relative;overflow:hidden}

.t1-item::before{content:'';position:absolute;top:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,var(--primary),#60a5fa);transform:scaleX(0);transform-origin:left;transition:transform .3s}

.t1-item:hover{border-color:var(--primary);box-shadow:0 4px 16px rgba(37,99,235,0.1);transform:translateY(-2px)}

.t1-item:hover::before{transform:scaleX(1)}

.t1-item .name{font-weight:600;font-size:15px;color:var(--text-main);display:flex;align-items:center;gap:8px}

.t1-item .name::before{content:'';display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--primary);opacity:0.6}

.t1-item .pct{font-size:28px;font-weight:800;color:var(--primary);margin:10px 0 4px;letter-spacing:-0.5px}

.t1-item .sub{font-size:12px;color:var(--text-muted);font-weight:500}

.t1-item .sub span{color:var(--text-secondary);font-weight:600}



/* Loading */

.loading{text-align:center;padding:80px 20px;color:var(--text-muted);font-size:15px;font-weight:500}

.loading::after{content:'';display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;margin-left:8px;vertical-align:middle}

@keyframes spin{to{transform:rotate(360deg)}}

</style>

</head>

<body>

<div class="header">

<h1>系统推荐卸车占比<span>· 上海市</span></h1>

<div class="header-controls">

<div class="filter-group">

<label>起始日期</label>

<input type="date" id="dp_start" onchange="onDateChange()">

<label>结束日期</label>

<input type="date" id="dp_end" onchange="onDateChange()">

</div>

<div class="filter-group">

<label>T2</label>

<select id="sel_t2" onchange="onT2Change()"><option value="">全部 T2</option></select>

<label>T1</label>

<select id="sel_t1" onchange="onT1Change()"><option value="">全部 T1</option></select>

<label>T0</label>

<select id="sel_t0" onchange="onT0Change()"><option value="">全部 T0</option></select>

</div>

<button class="btn secondary" onclick="resetFilters()">重置</button>

<button class="btn" onclick="latest()">最新</button>

</div>

</div>

<div class="container" id="app">

<div class="loading">数据加载中</div>

</div>

<script src="dashboard_data.js"></script>

<script>

let DATA = window.DATA || null;

let level = "city", t2 = "", t1 = "", worker = "";

let selStart = "", selEnd = "";



if (DATA) {
    function getUrlParam(name) {
        var p = new URLSearchParams(window.location.search);
        return p.get(name);
    }
    let dates = DATA.all_dates;
    let urlStart = getUrlParam('start');
    let urlEnd = getUrlParam('end');
    let urlT2 = getUrlParam('t2');
    let urlT1 = getUrlParam('t1');
    let urlWorker = getUrlParam('worker');
    selEnd = urlEnd || dates[dates.length - 1];
    selStart = urlStart || dates[Math.max(0, dates.length - 7)];
    if (urlT2) { t2 = urlT2; level = "t2"; }
    if (urlT1) { t1 = urlT1; level = "t1"; }
    if (urlWorker) { worker = urlWorker; level = "worker"; }
    document.getElementById("dp_start").value = selStart;
    document.getElementById("dp_end").value = selEnd;
    document.getElementById("sel_t2").value = t2;
    document.getElementById("sel_t1").value = t1;
    document.getElementById("sel_t0").value = worker;
    initFilters();
    render();
} else {

    document.getElementById("app").innerHTML = "<div class='loading'>数据加载失败</div>";

}



function initFilters() {

    let t2Sel = document.getElementById("sel_t2");

    t2Sel.innerHTML = '<option value="">全部 T2</option>';

    DATA.t2_list.forEach(t => { t2Sel.innerHTML += '<option value="' + t + '">' + t + '</option>'; });

    updateT1Options();

    updateT0Options();

}



function updateT1Options() {

    let t2Val = document.getElementById("sel_t2").value;

    let t1Sel = document.getElementById("sel_t1");

    let curT1 = t1Sel.value;

    t1Sel.innerHTML = '<option value="">全部 T1</option>';

    let t1s = new Set();

    if (t2Val) {

        DATA.t2_data[t2Val].t1_list.forEach(t => t1s.add(t));

    } else {

        for (let k in DATA.t1_data) t1s.add(DATA.t1_data[k].t1);

    }

    Array.from(t1s).sort().forEach(t => { t1Sel.innerHTML += '<option value="' + t + '">' + t + '</option>'; });

    if (t1s.has(curT1)) t1Sel.value = curT1;

    updateT0Options();

}



function updateT0Options() {

    let t2Val = document.getElementById("sel_t2").value;

    let t1Val = document.getElementById("sel_t1").value;

    let t0Sel = document.getElementById("sel_t0");

    let curT0 = t0Sel.value;

    t0Sel.innerHTML = '<option value="">全部 T0</option>';

    let workers = new Set();

    if (t2Val && t1Val) {

        let k = t2Val + "/" + t1Val;

        if (DATA.t1_data[k]) DATA.t1_data[k].workers.forEach(w => workers.add(w));

    } else if (t2Val) {

        DATA.t2_data[t2Val].t1_list.forEach(t1 => {

            let k = t2Val + "/" + t1;

            if (DATA.t1_data[k]) DATA.t1_data[k].workers.forEach(w => workers.add(w));

        });

    } else if (t1Val) {

        for (let k in DATA.t1_data) { if (DATA.t1_data[k].t1 === t1Val) DATA.t1_data[k].workers.forEach(w => workers.add(w)); }

    } else {

        for (let k in DATA.worker_data) { let parts = k.split("/"); if (parts.length >= 3) workers.add(parts[2]); }

    }

    Array.from(workers).sort().forEach(w => { t0Sel.innerHTML += '<option value="' + w + '">' + w + '</option>'; });

    if (workers.has(curT0)) t0Sel.value = curT0;

}



function onDateChange() {

    let s = document.getElementById("dp_start").value;

    let e = document.getElementById("dp_end").value;

    if (s && e && s <= e) { selStart = s; selEnd = e; }

    render();

}



function onT2Change() {

    t2 = document.getElementById("sel_t2").value;

    if (t2) level = "t2"; else level = "city";

    t1 = ""; worker = "";

    document.getElementById("sel_t1").value = "";

    document.getElementById("sel_t0").value = "";

    updateT1Options(); updateT0Options();

    render();

}



function onT1Change() {

    t1 = document.getElementById("sel_t1").value;

    if (t1) { level = "t1"; if (!t2) t2 = document.getElementById("sel_t2").value || DATA.t2_list[0]; }

    else { level = t2 ? "t2" : "city"; }

    worker = "";

    document.getElementById("sel_t0").value = "";

    updateT0Options();

    render();

}



function onT0Change() {

    worker = document.getElementById("sel_t0").value;

    if (worker) { level = "worker"; if (!t1) t1 = document.getElementById("sel_t1").value || DATA.t2_data[t2].t1_list[0]; }

    else { level = t1 ? "t1" : (t2 ? "t2" : "city"); }

    render();

}



function resetFilters() {

    level = "city"; t2 = ""; t1 = ""; worker = "";

    let dates = DATA.all_dates;

    selEnd = dates[dates.length - 1];

    selStart = dates[Math.max(0, dates.length - 7)];

    document.getElementById("dp_start").value = selStart;

    document.getElementById("dp_end").value = selEnd;

    document.getElementById("sel_t2").value = "";

    document.getElementById("sel_t1").value = "";

    document.getElementById("sel_t0").value = "";

    updateT1Options(); updateT0Options();

    render();

}



function latest() {

    let dates = DATA.all_dates;

    selEnd = dates[dates.length - 1];

    selStart = dates[Math.max(0, dates.length - 7)];

    document.getElementById("dp_start").value = selStart;

    document.getElementById("dp_end").value = selEnd;

    render();

}



function nav(l, a, b, c) {

    level = l; t2 = a || ""; t1 = b || ""; worker = c || "";

    document.getElementById("sel_t2").value = t2;

    document.getElementById("sel_t1").value = t1;

    document.getElementById("sel_t0").value = worker;

    updateT1Options(); updateT0Options();

    render();

}



function getDatesInRange(start, end) {
    return DATA.all_dates.filter(d => d >= start && d <= end);
}

function computeSummary(endDate) {
    let d = new Date(endDate + "T00:00:00");
    let year = d.getFullYear();
    let month = d.getMonth();
    let day = d.getDate();

    function fmtDate(dt) {
        let y = dt.getFullYear();
        let m = String(dt.getMonth() + 1).padStart(2, '0');
        let dd = String(dt.getDate()).padStart(2, '0');
        return y + "-" + m + "-" + dd;
    }

    // Week: Mon-Sun of endDate's week
    let dow = d.getDay();
    let monOffset = dow === 0 ? 6 : dow - 1;
    let monday = new Date(d); monday.setDate(day - monOffset);
    let sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
    let weekThisStart = fmtDate(monday);
    let weekThisEnd = fmtDate(sunday);

    // Previous week
    let prevMonday = new Date(monday); prevMonday.setDate(monday.getDate() - 7);
    let prevSunday = new Date(prevMonday); prevSunday.setDate(prevMonday.getDate() + 6);
    let weekLastStart = fmtDate(prevMonday);
    let weekLastEnd = fmtDate(prevSunday);

    // Month: 1st to last day of endDate's month
    let monthFirst = fmtDate(new Date(year, month, 1));
    let monthLastDay = new Date(year, month + 1, 0).getDate();
    let monthEnd = fmtDate(new Date(year, month, monthLastDay));

    // Previous month same range
    let prevMonth = new Date(year, month - 1, 1);
    let prevMonthYear = prevMonth.getFullYear();
    let prevMonthMonth = prevMonth.getMonth();
    let prevMonthLastDay = new Date(prevMonthYear, prevMonthMonth + 1, 0).getDate();
    let prevMonthEndDay = Math.min(day, prevMonthLastDay);
    let monthFirstPrev = fmtDate(new Date(prevMonthYear, prevMonthMonth, 1));
    let monthEndPrev = fmtDate(new Date(prevMonthYear, prevMonthMonth, prevMonthEndDay));

    // Aggregate helper
    function agg(daily, rangeStart, rangeEnd) {
        let dates = DATA.all_dates.filter(dt => dt >= rangeStart && dt <= rangeEnd);
        let num = 0, den = 0;
        dates.forEach(dt => { if (daily[dt]) { num += daily[dt].num; den += daily[dt].den; } });
        let ratio = den > 0 ? num / den : 0;
        return {num: Math.round(num*10)/10, den: Math.round(den*10)/10, ratio: Math.round(ratio*10000)/10000, pct: (Math.round(ratio*1000)/10).toFixed(1) + "%"};
    }

    return {
        weekThis: {start: weekThisStart, end: weekThisEnd},
        weekLast: {start: weekLastStart, end: weekLastEnd},
        monthThis: {start: monthFirst, end: monthEnd},
        monthLast: {start: monthFirstPrev, end: monthEndPrev},
        agg: agg
    };
}



function calcRangeStats(daily, start, end) {

    let dates = getDatesInRange(start, end);

    let num = 0, den = 0;

    dates.forEach(d => { if (daily[d]) { num += daily[d].num; den += daily[d].den; } });

    let ratio = den > 0 ? num / den : 0;

    return {num: num, den: den, ratio: ratio, pct: (ratio * 100).toFixed(1) + "%", dates: dates};

}



function getPrevRange(start, end) {

    let dates = DATA.all_dates;

    let startIdx = dates.indexOf(start);

    let endIdx = dates.indexOf(end);

    if (startIdx < 0 || endIdx < 0) return null;

    let len = endIdx - startIdx + 1;

    let prevEndIdx = startIdx - 1;

    let prevStartIdx = prevEndIdx - len + 1;

    if (prevStartIdx < 0) prevStartIdx = 0;

    if (prevEndIdx < 0) return null;

    return {start: dates[prevStartIdx], end: dates[prevEndIdx]};

}



function calcDayDeclineRanking() {

    let prev = getPrevRange(selStart, selEnd);

    if (!prev) return [];

    let ranking = [];

    if (level === "city") {

        // 上海市 → 下一层 T2

        DATA.t2_list.forEach(t2v => {

            let cur = calcRangeStats(DATA.t2_data[t2v].daily, selStart, selEnd);

            let prevStats = calcRangeStats(DATA.t2_data[t2v].daily, prev.start, prev.end);

            if (prevStats.ratio > 0 && cur.ratio > 0) {

                let decline = ((prevStats.ratio - cur.ratio) / prevStats.ratio) * 100;

                ranking.push({name: t2v, cur: cur, prev: prevStats, decline: decline});

            }

        });

    } else if (level === "t2" && t2) {

        // T2 → 下一层 T1

        let t1List = DATA.t2_data[t2].t1_list;

        t1List.forEach(t1v => {

            let k = t2 + "/" + t1v;

            if (!DATA.t1_data[k]) return;

            let cur = calcRangeStats(DATA.t1_data[k].daily, selStart, selEnd);

            let prevStats = calcRangeStats(DATA.t1_data[k].daily, prev.start, prev.end);

            if (prevStats.ratio > 0 && cur.ratio > 0) {

                let decline = ((prevStats.ratio - cur.ratio) / prevStats.ratio) * 100;

                ranking.push({name: t1v, cur: cur, prev: prevStats, decline: decline});

            }

        });

    } else if (level === "t1" && t2 && t1) {

        // T1 → 下一层 T0 作业人员

        let k = t2 + "/" + t1;

        if (DATA.t1_data[k]) {

            DATA.t1_data[k].workers.forEach(w => {

                let wkKey = t2 + "/" + t1 + "/" + w;

                if (!DATA.worker_data[wkKey]) return;

                let cur = calcRangeStats(DATA.worker_data[wkKey].daily, selStart, selEnd);

                let prevStats = calcRangeStats(DATA.worker_data[wkKey].daily, prev.start, prev.end);

                if (prevStats.ratio > 0 && cur.ratio > 0) {

                    let decline = ((prevStats.ratio - cur.ratio) / prevStats.ratio) * 100;

                    ranking.push({name: w, cur: cur, prev: prevStats, decline: decline});

                }

            });

        }

    }

    ranking.sort((a, b) => b.decline - a.decline);

    return ranking.slice(0, 3);

}



function calcWeekDeclineRanking() {

    let cs = computeSummary(selEnd);

        DATA.t2_list.forEach(t2v => {

            if (prev.ratio > 0 && cur.ratio > 0) {
                let decline = ((prev.ratio - cur.ratio) / prev.ratio) * 100;
                ranking.push({name: t2v, cur: cur, prev: prev, decline: decline});
            }
        });
    } else if (level === "t2" && t2) {
        let t1List = DATA.t2_data[t2].t1_list;
        t1List.forEach(t1v => {
            let k = t2 + "/" + t1v;
            if (!DATA.t1_data[k]) return;
            let cur = cs.agg(DATA.t1_data[k].daily, cs.weekThis.start, cs.weekThis.end);
            let prev = cs.agg(DATA.t1_data[k].daily, cs.weekLast.start, cs.weekLast.end);
            if (prev.ratio > 0 && cur.ratio > 0) {
                let decline = ((prev.ratio - cur.ratio) / prev.ratio) * 100;
                ranking.push({name: t1v, cur: cur, prev: prev, decline: decline});
            }
        });
    } else if (level === "t1" && t2 && t1) {
        let k = t2 + "/" + t1;
        if (DATA.t1_data[k]) {
            DATA.t1_data[k].workers.forEach(w => {

                    ranking.push({name: w, cur: cur, prev: prev, decline: decline});
                }

    ranking.sort((a, b) => b.decline - a.decline);

}



function calcTargetGoal(cs, selEnd, d) {
    const TARGET = 0.85;
    let endDate = new Date(selEnd + "T00:00:00");
    let year = endDate.getFullYear();
    let month = endDate.getMonth();
    let daysInMonth = new Date(year, month + 1, 0).getDate();

    // passed days: count dates in current month up to selEnd
    let passedDates = DATA.all_dates.filter(dt => {
        let dObj = new Date(dt + "T00:00:00");
        return dObj.getFullYear() === year && dObj.getMonth() === month && dt <= selEnd;
    });
    let passedDays = passedDates.length;
    let remainingDays = daysInMonth - passedDays;

    // Use dynamically computed monthly ratio
    let currentRatio = cs.agg(d.trend, cs.monthThis.start, cs.monthThis.end).ratio || 0;
    let timeProgress = (passedDays / daysInMonth) * 100;
    let goalProgress = (currentRatio / TARGET) * 100;

    let remainingPct = "-";
    let status = "normal";
    let isAchieved = false;

    if (remainingDays <= 0) {
        isAchieved = currentRatio >= TARGET;
        remainingPct = isAchieved ? "已达标" : "未达标";
        status = isAchieved ? "ok" : "danger";
    } else {
        let mt = cs.agg(d.trend, cs.monthThis.start, cs.monthThis.end);
        let num = mt.num || 0;
        let den = mt.den || 0;
        if (den > 0 && passedDays > 0) {
            let avgDailyDen = den / passedDays;
            let remainingDen = avgDailyDen * remainingDays;
            let targetTotalNum = TARGET * (den + remainingDen);
            let remainingNum = targetTotalNum - num;
            if (remainingNum <= 0) {
                isAchieved = true;
                remainingPct = "已达标";
                status = "ok";
            } else if (remainingDen > 0) {
                let reqRatio = remainingNum / remainingDen;
                remainingPct = (reqRatio * 100).toFixed(1) + "%";
                status = reqRatio > TARGET ? "danger" : (reqRatio > TARGET * 0.9 ? "warn" : "normal");
            }
        }
    }

    return {
        target: (TARGET * 100).toFixed(0) + "%",
        current: (currentRatio * 100).toFixed(1) + "%",
        timeProgress: timeProgress.toFixed(1),
        goalProgress: goalProgress.toFixed(1),
        remainingDays: remainingDays,
        remainingPct: remainingPct,
        status: status,
        passedDays: passedDays,
        daysInMonth: daysInMonth
    };
}



function ld() {
    if (level === "city") return {trend: DATA.city_daily, label: DATA.city};
    if (level === "t2") return {trend: DATA.t2_data[t2].daily, label: t2};
    if (level === "t1") { let k = t2 + "/" + t1; return {trend: DATA.t1_data[k].daily, label: t1}; }
    if (level === "worker") { let k = t2 + "/" + t1 + "/" + worker; return {trend: DATA.worker_data[k].daily, label: worker}; }
}



function getWeekRange(ds) {

    let d = new Date(ds + "T00:00:00"); let dow = d.getDay(); let mon = dow === 0 ? 6 : dow - 1;

    let monday = new Date(d); monday.setDate(d.getDate() - mon);

    let sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);

    return [monday.toISOString().slice(0,10), sunday.toISOString().slice(0,10)];

}



function buildSparkline(values, color, fillOpacity) {

    if (!values || values.length === 0) {

        return '<svg viewBox="0 0 600 180" preserveAspectRatio="none"><text x="300" y="90" text-anchor="middle" fill="var(--text-muted)" font-size="14" font-weight="500">暂无数据</text></svg>';

    }

    let mn = Math.min(...values), mx = Math.max(...values);

    if (mx === mn) mx = mn + 1;

    let w = 600, h = 180, pad = 30;

    let pts = values.map((v, i) => {

        let x = pad + (i / (values.length - 1)) * (w - pad * 2);

        let y = h - pad - ((v - mn) / (mx - mn)) * (h - pad * 2);

        return x.toFixed(1) + "," + y.toFixed(1);

    });

    let path = "M" + pts.join(" L");

    let area = path + " L" + pts[pts.length - 1].split(",")[0] + "," + (h - pad) + " L" + pad + "," + (h - pad) + " Z";

    let circles = pts.map((p, i) => { let xy = p.split(","); let isCurrent = i === values.length - 1; return '<circle cx="' + xy[0] + '" cy="' + xy[1] + '" r="' + (isCurrent ? 5 : 3) + '" fill="' + (isCurrent ? color : '#fff') + '" stroke="' + color + '" stroke-width="2"/>'; }).join("");

    let gridLines = "";

    for (let i = 0; i <= 4; i++) {

        let y = pad + (i / 4) * (h - pad * 2);

        gridLines += '<line x1="' + pad + '" y1="' + y + '" x2="' + (w - pad) + '" y2="' + y + '" stroke="#f1f5f9" stroke-width="1"/>';

    }

    return '<svg viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none"><defs><linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="' + color + '" stop-opacity="' + fillOpacity + '"/><stop offset="100%" stop-color="' + color + '" stop-opacity="0.05"/></linearGradient></defs>' + gridLines + '<path d="' + area + '" fill="url(#areaGrad)"/><path d="' + path + '" fill="none" stroke="' + color + '" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>' + circles + '</svg>';

}



function renderRankItem(item, idx) {

    let cls = idx === 0 ? "g1" : (idx === 1 ? "g2" : "g3");

    let curPct = (item.cur.ratio * 100).toFixed(1) + "%";

    let prevPct = (item.prev.ratio * 100).toFixed(1) + "%";

    let isDecline = item.decline > 0.01;

    let isImprove = item.decline < -0.01;

    let arrow = isDecline ? "▼" : (isImprove ? "▲" : "→");

    let pctColor = isDecline ? 'var(--danger)' : (isImprove ? 'var(--success)' : 'var(--primary)');

    let label = isDecline ? "降幅" : (isImprove ? "增幅" : "持平");

    return '<div class="rank-item"><div class="rank-num ' + cls + '">' + (idx + 1) + '</div><div class="rank-info"><div class="rank-name">' + item.name + '</div><div class="rank-detail">' + prevPct + ' → ' + curPct + '</div></div><div class="rank-val"><div class="rank-pct" style="color:' + pctColor + '">' + arrow + Math.abs(item.decline).toFixed(1) + '%</div><div class="rank-change">' + label + '</div></div></div>';

}

            let s2wt = cs.agg(t2Daily, cs.weekThis.start, cs.weekThis.end);
            let s2mt = cs.agg(t2Daily, cs.monthThis.start, cs.monthThis.end);
            h += '<div class="t1-item" onclick="nav(\'t2\',\'' + t2v + '\')"><div class="name">' + t2v + '</div><div class="pct">' + td.pct + '</div><div class="sub">本周 <span>' + s2wt.pct + '</span> · 本月 <span>' + s2mt.pct + '</span></div></div>';

        }

        h += '</div></div>';

    } else if (level === "t2") {

        h += '<div class="panel drill-panel"><h3>T1</h3><div class="drill-grid">';

        let t1s = DATA.t2_data[t2].t1_list;

        for (let i = 0; i < t1s.length; i++) {

            let t1v = t1s[i];

            let k = t2 + "/" + t1v;

            let t1Daily = DATA.t1_data[k].daily;
            let td = calcRangeStats(t1Daily, selStart, selEnd);
            let s1wt = cs.agg(t1Daily, cs.weekThis.start, cs.weekThis.end);
            let s1mt = cs.agg(t1Daily, cs.monthThis.start, cs.monthThis.end);
            h += '<div class="t1-item" onclick="nav(\'t1\',\'' + t2 + '\',\'' + t1v + '\')"><div class="name">' + t1v + '</div><div class="pct">' + td.pct + '</div><div class="sub">本周 <span>' + s1wt.pct + '</span> · 本月 <span>' + s1mt.pct + '</span></div></div>';

        }

        h += '</div></div>';

    } else if (level === "t1") {

        h += '<div class="panel drill-panel"><h3>T0 作业人员</h3><div class="drill-grid">';

        let k = t2 + "/" + t1;

        let workers = DATA.t1_data[k].workers.slice();

        workers.sort((a, b) => {
            let wkA = t2 + "/" + t1 + "/" + a;
            let wkB = t2 + "/" + t1 + "/" + b;
            let mtA = cs.agg(DATA.worker_data[wkA].daily, cs.monthThis.start, cs.monthThis.end);
            let mtB = cs.agg(DATA.worker_data[wkB].daily, cs.monthThis.start, cs.monthThis.end);
            return (mtB.ratio || 0) - (mtA.ratio || 0);
        });

        for (let i = 0; i < workers.length; i++) {
            let w = workers[i];
            let wk = t2 + "/" + t1 + "/" + w;
            let wDaily = DATA.worker_data[wk].daily;
            let wwt = cs.agg(wDaily, cs.weekThis.start, cs.weekThis.end);
            let wmt = cs.agg(wDaily, cs.monthThis.start, cs.monthThis.end);
            h += '<div class="t1-item" onclick="nav(\'worker\',\'' + t2 + '\',\'' + t1 + '\',\'' + w + '\')"><div class="name">' + w + '</div><div class="pct">' + wwt.pct + '</div><div class="sub">本周 <span>' + wwt.pct + '</span> · 本月 <span>' + wmt.pct + '</span></div></div>';

        }

        h += '</div></div>';

    }

    document.getElementById("app").innerHTML = h;

}

</script>

</body>

</html>
